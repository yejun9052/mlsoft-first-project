<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>* { box-sizing: border-box; }</style>
</helmet>
<div style="width:100%;height:100%;background:#0b121c;border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;padding:24px 16px;font-family:'Pretendard Variable',Pretendard,system-ui,sans-serif;">
  <div style="display:flex;align-items:center;gap:11px;padding:4px 8px 24px;">
    <div style="width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;font:800 15px Pretendard;color:#fff;">Y</div>
    <span style="font:700 18px Pretendard;color:#e9f0fa;letter-spacing:-.02em;">연차ON</span>
  </div>

  <div style="font:600 10px Pretendard;color:#4a5870;letter-spacing:.08em;padding:0 10px 8px;">MENU</div>
  <div style="display:flex;flex-direction:column;gap:3px;">
    <sc-for list="{{ menu }}" as="it" hint-placeholder-count="6">
      <div style="{{ it.rowStyle }}"><span style="{{ it.dotStyle }}"></span>{{ it.label }}<sc-if value="{{ it.hasBadge }}"><span style="margin-left:auto;font:700 11px Pretendard;color:#fff;background:#3b82f6;padding:2px 7px;border-radius:20px;">{{ it.badge }}</span></sc-if></div>
    </sc-for>
  </div>

  <div style="font:600 10px Pretendard;color:#4a5870;letter-spacing:.08em;padding:22px 10px 8px;">관리자</div>
  <div style="display:flex;flex-direction:column;gap:3px;">
    <sc-for list="{{ adminMenu }}" as="it" hint-placeholder-count="3">
      <div style="{{ it.rowStyle }}"><span style="{{ it.dotStyle }}"></span>{{ it.label }}<sc-if value="{{ it.hasBadge }}"><span style="margin-left:auto;font:700 11px Pretendard;color:#fff;background:#3b82f6;padding:2px 7px;border-radius:20px;">{{ it.badge }}</span></sc-if></div>
    </sc-for>
  </div>

  <div style="margin-top:auto;display:flex;align-items:center;gap:11px;padding:12px 10px;border-top:1px solid rgba(255,255,255,.06);">
    <div style="width:36px;height:36px;border-radius:50%;background:#22304a;display:flex;align-items:center;justify-content:center;font:700 13px Pretendard;color:#9db8e8;">김</div>
    <div style="line-height:1.3;"><div style="font:600 13px Pretendard;color:#e9f0fa;">김서연</div><div style="font:500 11px Pretendard;color:#6b7a90;">개발팀 · 사원</div></div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:236,&quot;height&quot;:760},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;대시보드&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;대시보드&quot;,&quot;연차 신청&quot;,&quot;사용 내역&quot;,&quot;팀 캘린더&quot;,&quot;복리후생&quot;,&quot;내 정보&quot;,&quot;결재 관리&quot;,&quot;구성원 관리&quot;,&quot;연차 정책&quot;]}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || '대시보드';
    const mk = (label, badge) => {
      const on = label === active;
      return {
        label,
        badge: badge || '',
        hasBadge: !!badge,
        rowStyle: `display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:10px;font:${on ? '600' : '500'} 14px Pretendard;color:${on ? '#7eb0ff' : '#8493a8'};background:${on ? 'rgba(59,130,246,.14)' : 'transparent'};`,
        dotStyle: `width:6px;height:6px;border-radius:50%;flex-shrink:0;background:${on ? '#3b82f6' : '#2a3a52'};`,
      };
    };
    return {
      menu: ['대시보드', '연차 신청', '사용 내역', '팀 캘린더', '복리후생', '내 정보'].map((l) => mk(l)),
      adminMenu: [mk('결재 관리', '2'), mk('구성원 관리'), mk('연차 정책')],
    };
  }
}
</script>
</body>
</html>
